name: CI - macOS arm64

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build (leave empty / blank choice to use the branch from 'Use workflow from' above)"
        required: false
        type: choice
        options:
          - ""
          - master
          - 2.0.0.7-testing
          - 2.0.0.8-testing
        default: ""
  workflow_call:      # called by release.yml on tag push
    inputs:
      branch:
        description: "Branch / ref to build (passed by release.yml)"
        required: false
        type: string
        default: ""

env:
  BUILDER_REPO: https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
  JOBS: 4

jobs:

  libs-fast-macos-arm64:
    name: Compile fast libraries — macOS arm64 (~20 min)
    runs-on: macos-14
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: false

      - name: Cache fast libraries
        uses: actions/cache@v4
        id: fast-cache
        with:
          path: |
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/db-6.2.32.NC
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/boost_1_80_0
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/openssl-1.1.1w
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/libevent-2.1.12-stable
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/miniupnpc-2.2.8
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/qrencode-4.1.1
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/gmp-6.3.0
          key: macos-arm64-fast-libs-${{ hashFiles('include/libs.pri', 'include/libs/bip39.pri') }}-v5
          restore-keys: macos-arm64-fast-libs-
          save-always: true

      - name: Clone DigitalNote-Builder
        if: steps.fast-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          mkdir -p DigitalNote-Builder
          cd DigitalNote-Builder
          if [ -d .git ]; then
            git pull
          else
            # Directory exists from cache restore (libs/ subtree) but no .git.
            # Initialize in place and pull the repo on top — cached untracked
            # files in libs/ are preserved.
            git init -q
            git remote add origin https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
            git fetch -q --depth=1 origin master
            git reset -q --hard origin/master
          fi

      - name: Install Homebrew packages
        if: steps.fast-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: bash update.sh

      - name: Download library source archives
        if: steps.fast-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/../DigitalNote-Builder/download
          cd ${{ github.workspace }}/../DigitalNote-Builder/download
          # --tries=3 --timeout=60 fails fast on flaky CDNs (esp. miniupnp.free.fr,
          # gmplib.org) instead of hanging the whole job. Keeping output verbose
          # so a future failure shows the actual URL/HTTP code.
          WGET="wget --tries=3 --timeout=60 --no-verbose"
          $WGET https://archives.boost.io/release/1.80.0/source/boost_1_80_0.tar.gz
          $WGET https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz
          $WGET http://download.oracle.com/berkeley-db/db-6.2.32.NC.tar.gz
          $WGET https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz
          $WGET "http://miniupnp.free.fr/files/download.php?file=miniupnpc-2.2.8.tar.gz" -O miniupnpc-2.2.8.tar.gz
          $WGET https://github.com/fukuchi/libqrencode/archive/refs/tags/v4.1.1.tar.gz
          # GNU's mirror is more reliable from GitHub Actions IP ranges than gmplib.org
          $WGET https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz

      - name: Compile fast libraries
        if: steps.fast-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: |
          mkdir -p temp libs
          CPUS=$(sysctl -n hw.logicalcpu)
          bash ../../compile/berkeleydb.sh "build_unix" "" "-j $CPUS"
          bash ../../compile/boost.sh "address-model=64 toolset=clang -j $CPUS"
          bash ../../compile/openssl.sh "darwin64-arm64-cc" "-j $CPUS"
          bash ../../compile/libevent.sh "" "-j $CPUS"
          bash ../../compile/miniupnpc.sh "libminiupnpc.a" "-j $CPUS"
          bash ../../compile/qrencode.sh "" "-j $CPUS"
          bash ../../compile/gmp.sh "--with-pic" "-j $CPUS"

  libs-qt-macos-arm64:
    name: Compile Qt 5.15.7 — macOS arm64 (up to 6hrs)
    runs-on: macos-14
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: false

      - name: Cache Qt arm64
        uses: actions/cache@v4
        id: qt-cache
        with:
          path: ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/qt-5.15.7
          key: macos-arm64-qt-5.15.7-v3
          restore-keys: macos-arm64-qt-5.15.7-v3-
          save-always: true

      - name: Clone DigitalNote-Builder
        if: steps.qt-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          mkdir -p DigitalNote-Builder
          cd DigitalNote-Builder
          if [ -d .git ]; then
            git pull
          else
            # Directory exists from cache restore (libs/ subtree) but no .git.
            # Initialize in place and pull the repo on top — cached untracked
            # files in libs/ are preserved.
            git init -q
            git remote add origin https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
            git fetch -q --depth=1 origin master
            git reset -q --hard origin/master
          fi

      - name: Install Homebrew packages
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: brew install perl freetype fontconfig

      - name: Download Qt source
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/../DigitalNote-Builder/download
          wget -q https://download.qt.io/archive/qt/5.15/5.15.7/single/qt-everywhere-opensource-src-5.15.7.tar.xz \
            -O ${{ github.workspace }}/../DigitalNote-Builder/download/qt-everywhere-opensource-src-5.15.7.tar.xz

      - name: Compile Qt
        if: steps.qt-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: |
          mkdir -p temp libs
          CPUS=$(sysctl -n hw.logicalcpu)
          echo "Compiling Qt with $CPUS jobs — this takes 1-3 hours"
          # Qt 5.15.7's configure defaults to x86_64 even on Apple Silicon hosts.
          # QMAKE_APPLE_DEVICE_ARCHS=arm64 forces a native arm64 build.
          bash ../../compile/qt.sh "QMAKE_APPLE_DEVICE_ARCHS=arm64" "-j $CPUS"

  build-macos-arm64:
    name: macOS arm64 (Apple Silicon) — Build + Test
    runs-on: macos-14
    timeout-minutes: 60
    needs: [ libs-fast-macos-arm64, libs-qt-macos-arm64 ]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: false

      - name: Restore fast libraries from cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/db-6.2.32.NC
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/boost_1_80_0
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/openssl-1.1.1w
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/libevent-2.1.12-stable
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/miniupnpc-2.2.8
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/qrencode-4.1.1
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/gmp-6.3.0
          key: macos-arm64-fast-libs-${{ hashFiles('include/libs.pri', 'include/libs/bip39.pri') }}-v5
          restore-keys: macos-arm64-fast-libs-
          save-always: true

      - name: Restore Qt from cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/libs/qt-5.15.7
          key: macos-arm64-qt-5.15.7-v3
          restore-keys: macos-arm64-qt-5.15.7-v3-
          save-always: true

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          mkdir -p DigitalNote-Builder
          cd DigitalNote-Builder
          if [ -d .git ]; then
            git pull
          else
            # Directory exists from cache restore (libs/ subtree) but no .git.
            # Initialize in place and pull the repo on top — cached untracked
            # files in libs/ are preserved.
            git init -q
            git remote add origin https://github.com/DigitalNoteXDN/DigitalNote-Builder.git
            git fetch -q --depth=1 origin master
            git reset -q --hard origin/master
          fi

      - name: Install Homebrew packages
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: bash update.sh

      # ── Configure macOS SDK ────────────────────────────────────────────────
      # On macos-14 runners with Xcode 15.4 + macOS 14.5 SDK, plain `clang`
      # invocations from leveldb's hand-rolled Makefile (and a few other
      # places that don't go through Qt) fail with:
      #   "fatal error: 'string' file not found"
      # The runner ships clang without an auto-resolving SDK, so we resolve
      # one once via xcrun and export it for every subsequent step. Writing
      # to $GITHUB_ENV makes it available across step boundaries.
      - name: Configure macOS SDK
        run: |
          SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"
          if [ -z "$SDKROOT" ] || [ ! -d "$SDKROOT" ]; then
            echo "ERROR: could not resolve macOS SDK via xcrun"
            xcrun --sdk macosx --show-sdk-path || true
            xcode-select -p || true
            exit 1
          fi
          echo "Resolved SDKROOT=$SDKROOT"
          echo "SDKROOT=$SDKROOT" >> "$GITHUB_ENV"
          # MACOSX_DEPLOYMENT_TARGET avoids the "Qt has only been tested with
          # version 11.0 of the platform SDK, you're using ." warning chain by
          # giving Qt's qmake an explicit deployment target to compare against.
          echo "MACOSX_DEPLOYMENT_TARGET=12.0" >> "$GITHUB_ENV"

      - name: Link source tree
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64/DigitalNote-2
          # Link libs next to DigitalNote-2 so $$PWD/../libs resolves correctly
          # $$PWD = github.workspace, so ../libs = parent/libs
          ln -sfn ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64/libs \
            ${{ github.workspace }}/../libs

      - name: Compile daemon (arm64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          # QMAKE_APPLE_DEVICE_ARCHS=arm64 defends against a Qt mkspec
          # that may have been baked with a different host arch. Without
          # this, an Intel-host-built Qt would emit -arch x86_64 even on
          # an Apple Silicon runner.
          qmake DigitalNote.daemon.pro \
            QMAKE_APPLE_DEVICE_ARCHS=arm64 \
            USE_UPNP=1 USE_BUILD_INFO=0 RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-daemon-macos-arm64.log
          exit ${PIPESTATUS[0]}

      - name: Compile Qt wallet (arm64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.app.pro \
            QMAKE_APPLE_DEVICE_ARCHS=arm64 \
            USE_UPNP=1 USE_QRCODE=1 USE_BUILD_INFO=0 RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-app-macos-arm64.log
          exit ${PIPESTATUS[0]}

      - name: Warning analysis
        if: always()
        run: |
          for log in build-app-macos-arm64.log build-daemon-macos-arm64.log; do
            if [ -f "${{ github.workspace }}/$log" ]; then
              W=$(grep -c ": warning:" "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              E=$(grep -c ": error:"   "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              echo "=== $log: $W warning(s), $E error(s) ==="
              if [ "$W" -gt 0 ]; then
                grep ": warning:" "${{ github.workspace }}/$log" \
                  | sed 's|.*: warning:||' | sort | uniq -c | sort -rn | head -20
              fi
            fi
          done

      - name: Report version + verify daemon built
        run: |
          # Extract the version constants from source and print them.
          # No assertion — if the source is wrong, the binary will be
          # wrong too, and that's a source-review problem, not a CI one.
          BUILD=$(grep -oE 'CLIENT_VERSION_BUILD[[:space:]]+[0-9]+' src/clientversion.h | awk '{print $NF}')
          PROTOCOL=$(grep -oE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*[0-9]+' src/version.h | awk '{print $NF}')
          MIN_PEER=$(grep -oE 'MIN_PEER_PROTO_VERSION[[:space:]]*=[[:space:]]*[0-9]+' src/version.h | awk '{print $NF}')
          echo "Building with:"
          echo "  CLIENT_VERSION_BUILD = $BUILD"
          echo "  PROTOCOL_VERSION = $PROTOCOL"
          echo "  MIN_PEER_PROTO_VERSION = $MIN_PEER"

          # Sanity: confirm a DigitalNoted binary actually got built.
          DAEMON=$(find ${{ github.workspace }} -name 'DigitalNoted' -type f | head -1)
          if [ -z "$DAEMON" ]; then
            echo "ERROR: DigitalNoted binary not found"; exit 1
          fi
          echo "OK: DigitalNoted built at $DAEMON"
          file "$DAEMON"
      - name: Package .app into .dmg
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/macos/arm64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          bash deploy.sh
          mv DigitalNote-2/DigitalNote-Qt.dmg DigitalNote-2/DigitalNote-Qt-arm64.dmg
          ls -lh DigitalNote-2/DigitalNote-Qt-arm64.dmg

      - name: Upload arm64 artefacts
        uses: actions/upload-artifact@v4
        timeout-minutes: 10
        with:
          name: digitalnote-macos-arm64
          # Explicit paths — NOT **/ globs. See ci-macos-x64.yml for the
          # full reasoning; same Builder symlink cycle exists here.
          path: |
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/DigitalNote-2/DigitalNote-Qt-arm64.dmg
            ${{ runner.workspace }}/DigitalNote-Builder/macos/arm64/DigitalNote-2/DigitalNoted
          retention-days: 14

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-macos-arm64-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-app-macos-arm64.log
            ${{ github.workspace }}/build-daemon-macos-arm64.log
          retention-days: 14