name: CI - Linux aarch64

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: false
        default: "2.0.0.7-testing"
  workflow_call:      # called by release.yml on tag push

env:
  BUILDER_REPO: https://github.com/rubber-duckie-au/DigitalNote-Builder.git
  JOBS: 4

jobs:

# ── Job 1: Fast libs ──────────────────────────────────────────────────────────
  libs-fast-aarch64:
    name: Compile fast libraries aarch64 (~30 min)
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Cache fast libraries
        uses: actions/cache@v4
        id: fast-cache
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/db-6.2.32.NC
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/boost_1_80_0
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/openssl-1.1.1w
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/libevent-2.1.12-stable
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/miniupnpc-2.2.8
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/qrencode-4.1.1
          key: linux-aarch64-fast-libs-${{ hashFiles('include/libs.pri') }}-v1
          restore-keys: linux-aarch64-fast-libs-

      - name: Set up QEMU for arm64 emulation
        if: steps.fast-cache.outputs.cache-hit != 'true'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install cross-compile toolchain
        if: steps.fast-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 qemu-user-static \
            libgmp-dev libboost-test-dev
          sudo bash ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/update.sh \
            2>/dev/null || true

      - name: Clone DigitalNote-Builder
        if: steps.fast-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git \
            2>/dev/null || (cd DigitalNote-Builder && git pull)

      - name: Download library source archives
        if: steps.fast-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder
        run: |
          mkdir -p download && cd download
          wget -q https://archives.boost.io/release/1.80.0/source/boost_1_80_0.tar.gz
          wget -q https://github.com/openssl/openssl/releases/download/OpenSSL_1_1_1w/openssl-1.1.1w.tar.gz
          wget -q http://download.oracle.com/berkeley-db/db-6.2.32.NC.tar.gz
          wget -q https://github.com/libevent/libevent/releases/download/release-2.1.12-stable/libevent-2.1.12-stable.tar.gz
          wget -q "http://miniupnp.free.fr/files/download.php?file=miniupnpc-2.2.8.tar.gz" -O miniupnpc-2.2.8.tar.gz
          wget -q https://github.com/fukuchi/libqrencode/archive/refs/tags/v4.1.1.tar.gz
          # GMP: use libgmp-dev system package (see Install system packages step)

      - name: Compile fast libraries (cross-compile aarch64)
        if: steps.fast-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          mkdir -p temp libs config
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          echo 'using gcc : aarch64 : aarch64-linux-gnu-g++ ;' > config/user-config.jam
          CPUS=$(nproc)
          ../../compile/berkeleydb.sh "build_unix" "--host aarch64-linux-gnu" "-j $CPUS"
          ../../compile/boost.sh "--user-config=../../config/user-config.jam toolset=gcc-aarch64 architecture=arm address-model=64 target-os=linux -j $CPUS"
          ../../compile/openssl.sh "linux-aarch64" "-j $CPUS"
          ../../compile/libevent.sh "--host aarch64-linux-gnu" "-j $CPUS"
          ../../compile/miniupnpc.sh "libminiupnpc.a" "-j $CPUS"
          ../../compile/qrencode.sh "--host aarch64-linux-gnu" "-j $CPUS"

# ── Job 2: Qt aarch64 ─────────────────────────────────────────────────────────
  libs-qt-aarch64:
    name: Compile Qt 5.15.7 aarch64 (up to 6hrs)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Cache Qt aarch64
        uses: actions/cache@v4
        id: qt-cache
        with:
          path: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/qt-5.15.7
          key: linux-aarch64-qt-5.15.7-v1
          restore-keys: linux-aarch64-qt-5.15.7-

      - name: Install cross-compile toolchain + Qt deps
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            libgmp-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcb1-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb-glx0-dev libxcb-keysyms1-dev libxcb-image0-dev \
            libxcb-shm0-dev libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-util-dev libxcb-xinerama0-dev \
            libxcb-xkb-dev

      - name: Clone DigitalNote-Builder
        if: steps.qt-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git \
            2>/dev/null || (cd DigitalNote-Builder && git pull)

      - name: Download Qt source
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ github.workspace }}/../DigitalNote-Builder/download
          wget -q https://download.qt.io/archive/qt/5.15/5.15.7/single/qt-everywhere-opensource-src-5.15.7.tar.xz \
            -O ${{ github.workspace }}/../DigitalNote-Builder/download/qt-everywhere-opensource-src-5.15.7.tar.xz

      - name: Compile Qt (cross-compile aarch64)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          mkdir -p temp libs
          echo "Compiling Qt for aarch64 — this takes 1-3 hours"
          ../../compile/qt.sh "-platform linux-g++ -xplatform linux-aarch64-gnu-g++ -bundled-xcb-xinput -fontconfig -system-freetype" ""

# ── Job 3: Build + Test aarch64 ───────────────────────────────────────────────
  build-linux-aarch64:
    name: Linux aarch64 — Build + Version Check
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: [ libs-fast-aarch64, libs-qt-aarch64 ]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || github.ref }}
          submodules: false
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up QEMU for arm64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Clone DigitalNote-Builder
        working-directory: ${{ github.workspace }}/..
        run: |
          git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/rubber-duckie-au/DigitalNote-Builder.git \
            2>/dev/null || (cd DigitalNote-Builder && git pull)
          mkdir -p DigitalNote-Builder/linux/aarch64/libs

      - name: Restore fast libraries from cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/db-6.2.32.NC
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/boost_1_80_0
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/openssl-1.1.1w
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/libevent-2.1.12-stable
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/miniupnpc-2.2.8
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/qrencode-4.1.1
          key: linux-aarch64-fast-libs-${{ hashFiles('include/libs.pri') }}-v1
          restore-keys: linux-aarch64-fast-libs-

      - name: Restore Qt from cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/libs/qt-5.15.7
          key: linux-aarch64-qt-5.15.7-v1
          restore-keys: linux-aarch64-qt-5.15.7-

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 qemu-user-static \
            libgmp-dev libboost-test-dev
          sudo bash ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/update.sh \
            2>/dev/null || true

      - name: Link source tree
        run: |
          ln -sfn ${{ github.workspace }} \
            ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64/DigitalNote-2

      - name: Compile daemon (aarch64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.daemon.pro \
            USE_UPNP=1 USE_BUILD_INFO=1 USE_BIP39=1 RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-daemon-aarch64.log
          exit ${PIPESTATUS[0]}

      - name: Compile Qt wallet (aarch64)
        working-directory: ${{ github.workspace }}/../DigitalNote-Builder/linux/aarch64
        run: |
          export PATH="$PWD/libs/qt-5.15.7/bin:$PATH"
          cd DigitalNote-2
          rm -rf build Makefile
          qmake DigitalNote.app.pro \
            USE_UPNP=1 USE_DBUS=1 USE_QRCODE=1 USE_BUILD_INFO=1 \
            USE_BIP39=1 RELEASE=1
          make -j${{ env.JOBS }} 2>&1 | tee ${{ github.workspace }}/build-app-aarch64.log
          exit ${PIPESTATUS[0]}

      - name: Assert version constants in source
        run: |
          grep -qE 'CLIENT_VERSION_BUILD[[:space:]]+7' src/clientversion.h || {
            echo "ERROR: CLIENT_VERSION_BUILD is not 7"; exit 1
          }
          grep -qE 'PROTOCOL_VERSION[[:space:]]*=[[:space:]]*62055' src/version.h || {
            echo "ERROR: PROTOCOL_VERSION is not 62055"; exit 1
          }
          echo "OK: BUILD=7, PROTOCOL=62055"

      - name: Warning analysis
        if: always()
        run: |
          for log in build-app-aarch64.log build-daemon-aarch64.log; do
            if [ -f "${{ github.workspace }}/$log" ]; then
              W=$(grep -c ": warning:" "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              E=$(grep -c ": error:"   "${{ github.workspace }}/$log" 2>/dev/null || echo 0)
              echo "=== $log: $W warning(s), $E error(s) ==="
            fi
          done

      - name: Upload aarch64 binaries
        uses: actions/upload-artifact@v4
        with:
          name: digitalnote-linux-aarch64
          path: |
            **/digitalnoted
            **/digitalnote-qt
            **/bitcoin-qt
          retention-days: 14

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-linux-aarch64-${{ github.sha }}
          path: |
            ${{ github.workspace }}/build-app-aarch64.log
            ${{ github.workspace }}/build-daemon-aarch64.log
          retention-days: 14
