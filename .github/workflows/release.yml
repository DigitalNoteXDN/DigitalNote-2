name: Release

on:
  # ── Manual trigger from Actions tab ──────────────────────────────────────────
  # Use this to fire a release without creating a tag yourself —
  # the workflow will create the tag and the GitHub Release in one atomic step.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (must match v*.*.*, e.g. v2.0.0.7 or v2.0.0.7-rc1)"
        required: true
        type: string
      ref:
        description: "Branch or commit SHA to build from"
        required: true
        type: string
        default: "2.0.0.7-testing"
      draft:
        description: "Publish as draft (RECOMMENDED — uncheck only when ready to make the release public)"
        required: false
        type: boolean
        default: true

  # ── Automatic trigger on tag push ────────────────────────────────────────────
  # Triggered when somebody runs:  git tag v2.0.0.7 && git push origin v2.0.0.7
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to create GitHub Releases and push tags

# ── Build all platforms in parallel ──────────────────────────────────────────
jobs:

  build-windows:
    name: Build Windows
    uses: ./.github/workflows/ci-windows.yml
    secrets: inherit
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

  build-linux-x64:
    name: Build Linux x64
    uses: ./.github/workflows/ci-linux-x64.yml
    secrets: inherit
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

  build-linux-aarch64:
    name: Build Linux aarch64
    uses: ./.github/workflows/ci-linux-aarch64.yml
    secrets: inherit
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

  build-macos:
    name: Build macOS
    uses: ./.github/workflows/ci-macos.yml
    secrets: inherit
    with:
      branch: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

# ── Package and publish the release ──────────────────────────────────────────
  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs:
      - build-windows
      - build-linux-x64
      - build-linux-aarch64
      - build-macos
    # Run even if some builds fail — publish whatever succeeded.
    # The "Verify at least one artifact" step below will still fail the job
    # if every platform failed.
    if: always()

    steps:
      # When triggered manually we check out the ref the user supplied.
      # When triggered by tag-push we check out the tag itself.
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      # Resolve the effective tag name once and re-use it everywhere below.
      # - For tag-push events: github.ref_name is already "v2.0.0.7"
      # - For manual dispatch: we use the tag the user typed
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Validate the format so we don't end up with garbage tags
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[A-Za-z0-9.]+)?$'; then
            echo "ERROR: tag '$TAG' does not match v*.*.* format"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG"

      - name: Download Windows x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-windows-x64
          path: dist/windows-x64
        continue-on-error: true

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-linux-x64
          path: dist/linux-x64
        continue-on-error: true

      - name: Download Linux aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-linux-aarch64
          path: dist/linux-aarch64
        continue-on-error: true

      - name: Download macOS x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-macos-x64
          path: dist/macos-x64
        continue-on-error: true

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: digitalnote-macos-arm64
          path: dist/macos-arm64
        continue-on-error: true

      - name: Package artifacts
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p release
          cd dist
          for platform in windows-x64 linux-x64 linux-aarch64 macos-x64 macos-arm64; do
            if [ -d "$platform" ] && [ "$(ls -A $platform 2>/dev/null)" ]; then
              ZIP="../release/DigitalNote-${TAG}-${platform}.zip"
              zip -r "$ZIP" "$platform/"
              echo "Packaged: DigitalNote-${TAG}-${platform}.zip"
            else
              echo "Skipping $platform - no artifacts found"
            fi
          done
          cd ..
          if ls release/*.zip 1>/dev/null 2>&1; then
            sha256sum release/*.zip > release/SHA256SUMS.txt
            echo "=== Checksums ==="
            cat release/SHA256SUMS.txt
          fi
          ls -lh release/

      # Refuse to publish a release with no binaries attached.
      # If every single platform failed, abort the job here so we don't end up
      # with an empty/misleading release on GitHub.
      - name: Verify at least one artifact exists
        run: |
          if ! ls release/*.zip 1>/dev/null 2>&1; then
            echo "ERROR: no platform produced a build artifact — aborting release"
            exit 1
          fi
          COUNT=$(ls release/*.zip | wc -l)
          echo "OK: $COUNT platform zip(s) ready for upload"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges -30)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES"       >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # When manually dispatched, create-and-tag in one step.
          # When tag-pushed, the tag already exists; this just attaches files to it.
          tag_name: ${{ steps.tag.outputs.tag }}
          target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
          name: "DigitalNote XDN ${{ steps.tag.outputs.tag }}"
          # Draft default is TRUE — releases never go public without explicit approval.
          # - manual dispatch: user checkbox controls (default checked = draft)
          # - tag-push: always draft (forces a review step in the UI)
          # If the user unchecks the box on a manual dispatch, we honour that
          # and publish straight to public.
          # NB: GitHub Actions has no ternary, so we use the fact that
          #     `workflow_dispatch` => inputs.draft is defined (bool),
          #     anything else      => default to true.
          draft: ${{ github.event_name != 'workflow_dispatch' || inputs.draft }}
          prerelease: ${{ contains(steps.tag.outputs.tag, 'rc') || contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'alpha') }}
          body: |
            ## DigitalNote XDN ${{ steps.tag.outputs.tag }}

            ### 🔐 BIP39 Recovery Phrase
            - 24-word recovery phrase generated automatically on wallet encryption — shown once, store it safely
            - Recovery phrase can unlock the wallet as an alternative to your password (wallet.dat must be present)
            - Existing wallets can upgrade via Settings → Recovery Phrase (one-time process, wallet stays encrypted)
            - `getrecoveryphrase` daemon RPC command — wallet must be unlocked to call
            - BIP39 library merged directly into the wallet binary — no longer an external submodule

            ### ⛏️ Masternode Fixes
            - Fixed: getblocktemplate always returned the same masternode winner every block (genesis block hash bug)
            - Fixed: all masternodes displayed the same "last paid" time (copy constructor bug)
            - Fixed: masternodes stopping when collateral wallet version differs from remote daemon version

            ### 🐛 Other Bug Fixes
            - Fixed: wallet banning peers on startup in mixed-version networks (transition-period block validation)
            - Fixed: CWallet::Unlock() now iterates all master keys so both password and recovery phrase unlock correctly

            ### 🖥️ Wallet GUI
            - Dark theme added — toggle via Settings
            - New splash screens with transparent circle logo — light and dark variants
            - MAINNET indicator in status bar
            - Password generator button in the encrypt wallet dialog
            - "Forgot password?" recovery phrase link in the unlock dialog
            - Staking-only checkbox hidden by default in standard unlock mode
            - Decrypt Wallet option added to Settings menu

            ### ⚠️ Upgrade Notes
            **Recovery phrase is only available for wallets encrypted with v2.0.0.7 or later.**
            Users with older wallets should go to Settings → Recovery Phrase immediately after upgrading to complete the one-time upgrade.

            **Recommended upgrade order for masternode operators:**
            1. Masternodes first (they generate winner votes)
            2. Mining pools second
            3. Stakers third
            4. Full nodes last

            ### Platform Downloads
            | Platform | File |
            |---|---|
            | Windows x64 | `DigitalNote-${{ steps.tag.outputs.tag }}-windows-x64.zip` |
            | Linux x64 | `DigitalNote-${{ steps.tag.outputs.tag }}-linux-x64.zip` |
            | Linux aarch64 (ARM) | `DigitalNote-${{ steps.tag.outputs.tag }}-linux-aarch64.zip` |
            | macOS Intel | `DigitalNote-${{ steps.tag.outputs.tag }}-macos-x64.zip` |
            | macOS Apple Silicon | `DigitalNote-${{ steps.tag.outputs.tag }}-macos-arm64.zip` |

            ### SHA256 Checksums
            See `SHA256SUMS.txt` attached below.

            ### Changes since last release
            ${{ steps.changelog.outputs.CHANGELOG }}

          files: |
            release/*.zip
            release/SHA256SUMS.txt
          token: ${{ secrets.PAT_TOKEN }}
          fail_on_unmatched_files: false
